name: Build and Release Desktop

on:
  release:
    types: [published]

jobs:
  build-mac:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-13
            arch: x64
          - os: macos-latest
            arch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build (tsc + vite)
        run: npx tsc && npx vite build --config vite.electron.config.ts

      - name: Package with electron-builder
        run: npx electron-builder --mac --${{ matrix.arch }} --publish never

      - name: Upload DMG to release
        uses: softprops/action-gh-release@v2
        with:
          files: release/**/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build (tsc + vite)
        run: npx tsc && npx vite build --config vite.electron.config.ts

      - name: Package with electron-builder
        run: npx electron-builder --win --publish never

      - name: Upload installers to release
        uses: softprops/action-gh-release@v2
        with:
          files: release/**/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install RPM build tools
        run: sudo apt-get install -y rpm

      - run: npm ci

      - name: Build (tsc + vite)
        run: npx tsc && npx vite build --config vite.electron.config.ts

      - name: Package with electron-builder
        run: npx electron-builder --linux AppImage deb rpm --publish never

      - name: Upload packages to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/**/*.AppImage
            release/**/*.deb
            release/**/*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux-flatpak:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Flatpak build tools
        run: |
          sudo apt-get install -y flatpak flatpak-builder
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub org.freedesktop.Platform//23.08 org.freedesktop.Sdk//23.08

      - run: npm ci

      - name: Build (tsc + vite)
        run: npx tsc && npx vite build --config vite.electron.config.ts

      - name: Package with electron-builder
        run: npx electron-builder --linux flatpak --publish never

      - name: Upload Flatpak to release
        uses: softprops/action-gh-release@v2
        with:
          files: release/**/*.flatpak
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
